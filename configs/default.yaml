# MaterialAgent default configuration draft.

input:
  partphys_scene: null
  physgm_root: ../PhysGM
  template_config: ../PhysGM/configs/physical/down_template.json

output:
  subdir: material_agent
  save_keyframes: true
  save_reports: true

evidence:
  use_partphys_crop_outputs: true
  use_physgm_distribution: true
  physgm_crop_variants: [context_dim]
  use_vlm_material_prior: false
  use_skill_memory: true
  skill_memory_path: material_skills.yaml

posterior:
  schema_expected_material_weight: 0.30
  physgm_crop_weight: 0.35
  vlm_prior_weight: 0.20
  skill_memory_weight: 0.15
  global_physgm_weight_for_multi_part: 0.10

sampling:
  candidate_budget: 5
  include_baseline_partphys: true
  include_posterior_map: true
  include_soft_response: true
  include_stiff_response: true
  include_uncertain_part_sweep: true
  random_seed: 1234

simulation:
  run: false
  mock_sim: false
  render_img: true
  compile_video: true
  white_bg: true
  timeout_sec: 1800
  max_parallel: 1

solver_clamp:
  local_nu_range: [0.05, 0.45]
  local_density_range: [300.0, 3000.0]



solver_regularization:
  composite_visual_material: Plasticine
  composite_E: 500000.0
  composite_nu: 0.476
  composite_density: 5000.0
  composite_E_min_scale: 0.85
  composite_E_max_scale: 1.7
  composite_support_E_scale: 1.6
  composite_detail_E_scale: 1.45
  composite_decoration_E_scale: 1.25
  composite_coating_E_scale: 1.05
  hard_bonded_support_E: 10000000.0
  hard_bonded_support_E_cap: 10000000.0
  hard_bonded_support_nu: 0.35
  hard_bonded_support_density: 2500.0
  hard_bonded_body_E: 500000.0
  hard_bonded_body_nu: 0.476
  hard_bonded_body_density: 5000.0

solver_stability:
  enabled: true
  reference_E: 5.0e6
  reference_nu: 0.35
  reference_density: 2500.0
  safety_factor: 0.70
  min_substep_dt: 5.0e-5
  max_substeps_per_frame: 800

evaluation:
  selection: auto
  use_vlm_judge: false
  hard_fail_blank_video: true
  hard_fail_explosion: true
  prefer_rigid_parts_less_deformed: true
  prefer_temporal_smoothness: true

memory:
  update_after_selection: true
  min_score_to_store: 0.55
  max_entries_per_key: 20


agent:
  max_rounds: 3
  repair_budget: 3
  acceptance_score: 0.72
  support_E_min: 1.0e7
  support_E_floor: 1.0e7
  support_E_cap: 1.0e7
  cohesive_E_floor: 5.0e5
  cohesive_density_floor: 500.0
  stability_density_floor: 300.0
  stability_nu_cap: 0.40
  spread_growth_limit: 2.0
  height_ratio_min: 0.45
